name: smoke

on:
  push:
  pull_request:

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: tools
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm
          python3 --version
          nasm -v

      - name: current
        run: python3 tools/check_current.py .

      - name: build
        run: make PYTHON=python3

      - name: verify
        run: |
          python3 tools/check_image.py build/bonebox.img
          python3 tools/smoke_image.py build/bonebox.img
          python3 tools/inspect_image.py build/bonebox.img
          test -f build/bonebox.iso

      - name: proof
        run: |
          python3 tools/write_manifest.py . build/bonebox.img build/bonebox.manifest.json
          sha256sum build/bonebox.img | tee build/bonebox.img.sha256
          sha256sum build/bonebox.iso | tee build/bonebox.iso.sha256
          ls -l build/bonebox.img build/bonebox.img.sha256 build/bonebox.iso build/bonebox.iso.sha256 build/bonebox.manifest.json

      - name: artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonebox-img-iso
          path: |
            build/bonebox.img
            build/bonebox.img.sha256
            build/bonebox.iso
            build/bonebox.iso.sha256
            build/bonebox.manifest.json
          if-no-files-found: error
